      { "@type": "Question", "name": "Cuanto cuesta contratar seguridad privada para un evento?",
        "acceptedAnswer": { "@type": "Answer", "text": "El costo depende del aforo, tipo de evento, duracion y nivel de servicio requerido. SeguridadEventos cotiza personalizado segun numero de elementos, complejidad operativa, equipamiento (detectores, drones, vehiculos), coordinacion institucional necesaria y desplazamiento si aplica. La cotizacion detallada con plan operativo se entrega en menos de 24 horas habiles sin compromiso." } },
      { "@type": "Question", "name": "Cuentan con licencia DGSSP federal vigente?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. SeguridadEventos opera con Licencia DGSSP federal vigente que autoriza prestar servicios de seguridad privada en toda la Republica Mexicana, cumpliendo con la Ley Federal de Seguridad Privada. Adicionalmente cuenta con certificacion STPS para personal, ISO 9001 en procesos y Registro DGSP municipal." } },
      { "@type": "Question", "name": "Que tipos de eventos cubren?",
        "acceptedAnswer": { "@type": "Answer", "text": "SeguridadEventos protege seis tipos de eventos con protocolos diferenciados: 1) conciertos y festivales con control de multitudes y proteccion de artistas, 2) eventos corporativos con personal bilingue y NDA, 3) eventos sociales (bodas, XV anos) con seguridad invisible, 4) eventos VIP con close protection y anti-paparazzi, 5) eventos masivos +10,000 asistentes con drones y puesto de mando, y 6) ferias y exposiciones con control de expositores." } },
      { "@type": "Question", "name": "Con cuanta anticipacion debo contratar seguridad para un evento?",
        "acceptedAnswer": { "@type": "Answer", "text": "Para eventos masivos (+10,000 asistentes) o de alto perfil, lo ideal es contratar con al menos 30-60 dias de anticipacion para diagnostico, plan operativo y coordinacion con autoridades. Eventos medianos (1,000-10,000) requieren 15-30 dias. Eventos pequenos pueden gestionarse en menos de 7 dias habiles. SeguridadEventos puede activar operativos de emergencia en 48 horas si la situacion lo requiere." } },
      { "@type": "Question", "name": "Que incluye el control de acceso para eventos?",
        "acceptedAnswer": { "@type": "Answer", "text": "Verificacion de boletos, escaneo de codigos QR, detectores de metales en accesos peatonales, revision de mochilas y objetos, credencialización de staff, gestion de aforo en tiempo real, control de areas restringidas (backstage, VIP, prensa) y registro digital con bitacora de incidentes. Todo coordinado bajo un solo proveedor con plan operativo unificado." } },
      { "@type": "Question", "name": "Tienen experiencia coordinando con Proteccion Civil y autoridades?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. La empresa cuenta con +15 anos de experiencia coordinando con Proteccion Civil federal y estatal, bomberos, cruz roja, policia local y autoridades sanitarias. Cada plan operativo incluye protocolo de comunicacion institucional documentado y, en eventos de alto perfil, presencia de enlace con autoridades durante toda la operacion." } },
      { "@type": "Question", "name": "Operan drones de vigilancia en eventos masivos?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. Para eventos masivos (+10,000 asistentes) o eventos con alta complejidad operativa, SeguridadEventos despliega drones de vigilancia para monitoreo aereo del aforo, deteccion de aglomeraciones criticas, identificacion de puntos de evacuacion bloqueados y respaldo video del operativo. Los drones operan bajo autorizacion vigente y se coordinan con torre de control si aplica." } },
      { "@type": "Question", "name": "Tienen cobertura nacional o solo CDMX?",
        "acceptedAnswer": { "@type": "Answer", "text": "Cobertura nacional con presencia activa en Ciudad de Mexico, Guadalajara, Monterrey, Puebla y Cancun. Cuentan con personal local certificado en cada plaza, lo que reduce costos de movilizacion y garantiza conocimiento del entorno regional. Para eventos en otras ciudades de Mexico se cotiza con desplazamiento del equipo base." } },
      { "@type": "Question", "name": "Que protocolos de seguridad VIP ofrecen?",
        "acceptedAnswer": { "@type": "Answer", "text": "Servicio de close protection con escoltas certificados, manejo de rutas alternas, vehiculo blindado opcional, control anti-paparazzi, coordinacion con avanzada en el destino, manejo de prensa y discrecion total. Adecuado para celebridades, artistas, ejecutivos C-level, autoridades politicas y delegaciones extranjeras. Cada operativo VIP incluye briefing previo con el principal o su equipo." } }
