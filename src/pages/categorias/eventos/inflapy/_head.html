      { "@type": "Question", "name": "Cuanto cuesta rentar un inflable en CDMX con INFLAPY?",
        "acceptedAnswer": { "@type": "Answer", "text": "Los precios dependen del tamano y el tipo. Los inflables chicos (Mini Castillo 2x2m) inician desde $800 MXN. Los medianos (Dragones Rojos, Castillo de Princesas, Mini Jungla) van desde $1,200 a $1,350 MXN. Los grandes (Castillo Blanco, Barco Pirata, Circuito Extremo) van desde $1,700 a $1,900 MXN. Todos los modelos incluyen entrega, instalacion profesional y recoleccion sin cargos sorpresa por escaleras, distancia ni horario del evento. La cotizacion personalizada llega por WhatsApp en menos de 1 hora." } },
      { "@type": "Question", "name": "En que colonias y alcaldias de CDMX hacen entregas?",
        "acceptedAnswer": { "@type": "Answer", "text": "INFLAPY cubre las 16 alcaldias de la Ciudad de Mexico (Alvaro Obregon, Azcapotzalco, Benito Juarez, Coyoacan, Cuajimalpa, Cuauhtemoc, Gustavo A. Madero, Iztacalco, Iztapalapa, Magdalena Contreras, Miguel Hidalgo, Milpa Alta, Tlalpan, Tlahuac, Venustiano Carranza, Xochimilco) y la zona poniente del Estado de Mexico: Satelite, Interlomas, Naucalpan, Huixquilucan, Tecamachalco, Atizapan, Tlalnepantla. Si tu domicilio queda fuera de la zona habitual, te lo decimos antes de apartar con el costo de traslado claro." } },
      { "@type": "Question", "name": "Que incluye el servicio de renta?",
        "acceptedAnswer": { "@type": "Answer", "text": "Cada renta incluye entrega a domicilio, instalacion profesional con anclaje seguro, desinfeccion completa del inflable, soplador con extension electrica, soporte telefonico durante el evento y recoleccion al finalizar. Sin costos ocultos, sin cargos extra por montaje en azotea, escaleras, distancia dentro de la zona habitual o por la hora del evento. Tu solo necesitas un espacio suficiente y un contacto electrico estandar a no mas de 15 metros del area de instalacion." } },
      { "@type": "Question", "name": "Cuanto espacio necesito para poner un inflable?",
        "acceptedAnswer": { "@type": "Answer", "text": "Depende del inflable. Los pequenos como Mini Castillo necesitan minimo 3x3 m de espacio libre. Los medianos (Dragones Rojos, Castillo de Princesas, Mini Jungla, Gusanitos) requieren 5x4 m. Los grandes (Barco Pirata, Extremo, Castillo Blanco) necesitan al menos 8x5 m. Tambien se requiere altura libre minima de 2.5 metros. Si no estas seguro del espacio disponible, manda las medidas por WhatsApp y INFLAPY recomienda el inflable que mejor se ajusta." } },
      { "@type": "Question", "name": "Con cuanta anticipacion debo reservar el inflable?",
        "acceptedAnswer": { "@type": "Answer", "text": "Recomendado reservar con al menos 5 a 7 dias de anticipacion, especialmente para fines de semana y temporada alta (mayo y diciembre). Para ultimas horas o el mismo dia, contactar directamente por WhatsApp porque ocasionalmente hay disponibilidad. La reserva se confirma con 50% de anticipo (efectivo, transferencia o tarjeta) y queda apartada por escrito con hora de llegada, direccion y forma de pago del saldo." } },
      { "@type": "Question", "name": "Que pasa si llueve el dia de mi fiesta?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si llueve fuerte hay dos opciones sin penalizacion: 1) reagendar sin costo adicional sujeto a disponibilidad de la nueva fecha, o 2) usar el inflable bajo techo si cuentas con un espacio con altura y dimensiones suficientes. Solo se requiere avisar con al menos 2 horas de anticipacion para coordinar la logistica de reagendado o de instalacion bajo techo." } },
      { "@type": "Question", "name": "Los inflables estan limpios y son seguros para los ninos?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si, 100%. Cada inflable pasa por un proceso completo de lavado, desinfeccion y revision antes y despues de cada evento. Se usan productos seguros sin olor fuerte aptos para ninos de todas las edades. Todos los inflables cuentan con multiples puntos de anclaje y son instalados por personal capacitado con anos en el oficio. Antes de salir del taller se revisan costuras, soplador y conexiones electricas en cada salida." } },
      { "@type": "Question", "name": "Que tipos de juegos inflables tienen disponibles?",
        "acceptedAnswer": { "@type": "Answer", "text": "Catalogo curado de 8 modelos: Mini Castillo para departamentos (1-3 anos), Dragones Rojos mediano (4-12 anos, mas popular), Mini Jungla con tematica safari (5-10 anos), Gusanitos con tuneles (todas edades), Castillo de Princesas con resbaladilla (3-10 anos), Barco Pirata con tobogan (4+ anos), Circuito Extremo de obstaculos (6+ anos para kermesses y team building) y Castillo Blanco minimalista (para bodas y primeras comuniones). Tambien rentamos alberca de pelotas para bebes." } },
      { "@type": "Question", "name": "Se puede rentar un inflable para un departamento o espacio pequeno?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. El Mini Castillo mide 2x2 m y cabe en sala, terraza o un cuarto despejado — funciona muy bien para primeros cumpleanos en departamento o fiestas a domicilio en espacios pequenos. Lo unico que se necesita es un contacto electrico cerca y suficiente altura libre (2.5 m minimo). INFLAPY instala en menos de 30 minutos y al final recoge todo — tu no mueves nada." } },
      { "@type": "Question", "name": "Hay inflables disponibles para adultos o eventos corporativos?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. Para eventos sociales y corporativos INFLAPY renta circuitos de obstaculos por equipos (Extremo, ideal para team building), inflables grandes con tobogan (Barco Pirata) y opciones premium en blanco para activaciones de marca o cocteles. Funciona igual para ninos en kermesses y para adultos en family day, posadas corporativas o eventos de empresa. Cotizacion personalizada con paquete completo segun el evento." } }
