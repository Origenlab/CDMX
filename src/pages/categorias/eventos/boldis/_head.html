      { "@type": "Question", "name": "Cuanto cuesta rentar una bola disco en CDMX con BOLDIS?",
        "acceptedAnswer": { "@type": "Answer", "text": "El servicio inicia desde $1,299 para bolas disco pequenas de 30 cm. El costo final depende del tamano (30 cm, 50 cm, 60 cm LED RGB, 80 cm, 150 cm jumbo o 200 cm gigante), modelo (espejo clasico o LED RGB con 16 millones de colores) y servicios complementarios (DMX, pin spots, iluminacion adicional). Todos los paquetes incluyen transporte en CDMX, instalacion profesional certificada, motor rotativo, pruebas y desmontaje. La cotizacion personalizada llega en menos de 1 hora por WhatsApp." } },
      { "@type": "Question", "name": "Que incluye el servicio de renta de bolas disco?",
        "acceptedAnswer": { "@type": "Answer", "text": "Servicio completo todo incluido: transporte ida y vuelta en CDMX y Estado de Mexico, instalacion profesional con tecnicos certificados (montaje en techo o estructura), motor rotativo industrial, iluminacion basica, pruebas de funcionamiento previas al evento, soporte tecnico durante el evento y desmontaje al finalizar. Sin sorpresas, sin cargos ocultos — lo cotizado es lo que se factura." } },
      { "@type": "Question", "name": "Con cuanta anticipacion debo reservar una bola disco?",
        "acceptedAnswer": { "@type": "Answer", "text": "Recomendamos minimo 2 semanas de anticipacion, especialmente para eventos en temporada alta (mayo-junio bodas, noviembre-diciembre fiestas corporativas y XV anos). Para eventos urgentes BOLDIS ofrece servicio express con disponibilidad sujeta a stock — consultar por WhatsApp con fecha, horario y ubicacion para confirmar." } },
      { "@type": "Question", "name": "Que tamano de bola disco necesito para mi evento?",
        "acceptedAnswer": { "@type": "Answer", "text": "Guia oficial BOLDIS por aforo: 30-40 cm para eventos intimos de hasta 50 personas (sesiones fotograficas, decoracion), 50-60 cm para eventos medianos de 100-200 personas (mas popular para bodas), 80-100 cm para bodas premium y XV anos de 300+ personas, 150-200 cm para conciertos, festivales y eventos masivos en estadios. Si no estas seguro, BOLDIS recomienda el tamano correcto segun aforo y venue durante la cotizacion." } },
      { "@type": "Question", "name": "Ofrecen iluminacion adicional ademas de las bolas disco?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. BOLDIS cuenta con catalogo complementario: pin spots LED para mesas, proyectores RGB, iluminacion arquitectonica decorativa y sistemas DMX profesionales programables. Se pueden armar paquetes completos de iluminacion para evento con un solo proveedor — bolas disco como centro y elementos complementarios para cubrir pista, mesas, perimetro y escenario." } },
      { "@type": "Question", "name": "Puedo comprar una bola disco en lugar de rentarla?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. BOLDIS ofrece venta de equipos profesionales con garantia de fabrica, motores giratorios industriales incluidos y asesoria tecnica especializada. La venta es ideal para empresas de eventos recurrentes, DJs profesionales, clubes nocturnos y salones de fiestas. Hay descuentos por volumen para compra mayorista." } },
      { "@type": "Question", "name": "Que diferencia hay entre bola disco de espejo y LED RGB?",
        "acceptedAnswer": { "@type": "Answer", "text": "Las bolas disco clasicas de espejo reflejan luz externa (proyectores o reflectores apuntados a la bola) creando el efecto disco tradicional con destellos blancos o de color. Las bolas LED RGB tienen iluminacion integrada propia, cambian automaticamente entre 16 millones de colores, responden al ritmo musical con sensor automatico y consumen hasta 70% menos energia. Ambas opciones disponibles en BOLDIS segun el tipo de evento." } },
      { "@type": "Question", "name": "Realizan instalaciones de bolas disco en exteriores?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. BOLDIS realiza instalaciones en exteriores con estructura reforzada (trusses, polipastos), proteccion contra clima (carpas, cubiertas) y equipo especializado de montaje exterior. Requiere evaluacion previa del sitio (altura disponible, anclajes, accesos para grua) y puede tener costo adicional segun complejidad. Cotizacion personalizada con visita tecnica al venue." } },
      { "@type": "Question", "name": "Que diferencia a BOLDIS de otros proveedores de iluminacion?",
        "acceptedAnswer": { "@type": "Answer", "text": "Cinco diferenciadores documentados: 1) mas de 20 anos especializados exclusivamente en bolas disco e iluminacion para eventos, 2) catalogo mas amplio del mercado mexicano (6 modelos de 30 cm a 200 cm en espejo clasico y LED RGB), 3) transparencia total con cotizacion detallada en menos de 1 hora y sin costos ocultos, 4) instalacion profesional certificada con tecnicos especializados que llegan 3 horas antes del evento, y 5) cobertura completa CDMX + Estado de Mexico + foraneos (Queretaro, Puebla, Cuernavaca, Pachuca, Tlaxcala) con servicio el mismo dia disponible." } }
