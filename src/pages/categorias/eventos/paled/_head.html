      { "@type": "Question", "name": "Cuanto cuesta una pantalla LED en Mexico con PALED?",
        "acceptedAnswer": { "@type": "Answer", "text": "El precio depende del tamano, paso de pixel y tipo (interior/exterior). Una pantalla exterior IP65 de 2m x 3m con P6 parte desde $25,000 MXN. Las interiores Ultra HD con P2 pueden superar $80,000 MXN para proyectos de mayor formato. Para renta de eventos, las tarifas se cotizan por dia, fin de semana o semana completa con transporte, montaje, operador y desarmado incluidos. La cotizacion personalizada llega en menos de 2 horas habiles por WhatsApp." } },
      { "@type": "Question", "name": "Que paso de pixel necesito para mi pantalla LED?",
        "acceptedAnswer": { "@type": "Answer", "text": "Depende de la distancia de vision. Para 3-6 metros (interior) usar P2 o P3. Para 5-10 metros en exteriores, P4 o P5. Para espectaculares en calles principales, P6 a P10. En autopistas (+15m), P10 a P16. Para eventos en escenarios, P3.9 o P4.8 son los estandares. Para pisos LED P6.25 o P8.9. La asesoria tecnica para seleccionar el paso correcto es gratuita en PALED." } },
      { "@type": "Question", "name": "Cuanto tiempo tarda la instalacion de una pantalla LED?",

      { "@type": "Question", "name": "Las pantallas LED incluyen garantia?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. Todos los equipos PALED tienen garantia de fabrica de 2 anos que cubre defectos de manufactura, modulos LED, tarjetas de recepcion y fuentes de poder. El servicio de garantia se brinda en sitio, sin costos de traslado adicionales en CDMX y zona metropolitana. Para foraneos, hay esquema de gestion de garantia con aliados tecnicos certificados." } },
      { "@type": "Question", "name": "Hacen instalaciones en toda la Republica Mexicana?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. PALED tiene operacion propia en Ciudad de Mexico y Estado de Mexico, con flota y tecnicos in house. Para Guadalajara, Monterrey, Puebla, Cancun y resto de la Republica, coordina instalaciones con aliados tecnicos certificados — mismo estandar de calidad bajo coordinacion del equipo PALED CDMX. Cobertura comercial nacional total." } },
      { "@type": "Question", "name": "Rentan pantallas LED para eventos de un dia?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. PALED ofrece renta de modulos LED por dia, fin de semana o semana completa. El servicio incluye transporte ida y vuelta, armado, operador tecnico durante el evento y desarmado al cierre. Ideal para conciertos, convenciones corporativas, bodas premium, exposiciones, activaciones de marca y eventos deportivos. Modulos compatibles con backdrop, escenario o stage LED segun produccion." } },
      { "@type": "Question", "name": "Pueden instalar en edificios sin alterar la fachada?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. PALED disena estructuras de montaje que respetan la integridad del inmueble. Usa sistemas de anclaje aprobados, soportes desmontables y, cuando es necesario, coordina los permisos de uso de suelo correspondientes con la autoridad municipal. Para fachadas de vidrio existe la opcion de pantalla transparente Glass LED con hasta 85% de transparencia que no obstruye visibilidad interior." } },
      { "@type": "Question", "name": "Que software se usa para controlar el contenido?",
        "acceptedAnswer": { "@type": "Answer", "text": "PALED trabaja con los sistemas de control mas usados de la industria: Nova Star y Linsn, compatibles con Windows y Android. Tambien integra soluciones en la nube para actualizacion remota de contenido desde cualquier dispositivo. La capacitacion del equipo del cliente esta incluida sin costo adicional como parte del servicio de instalacion." } },
      { "@type": "Question", "name": "Que diferencia a PALED de otros proveedores de pantallas LED?",
        "acceptedAnswer": { "@type": "Answer", "text": "Seis diferenciadores: 1) proveedor directo de fabrica sin intermediarios (mejor precio con garantia real), 2) instalacion certificada con tecnicos especializados y cumplimiento NOM electrico, 3) soporte 24/7 con respuesta inmediata ante fallas, 4) garantia de fabrica 2 anos en todos los equipos, 5) asesoria tecnica gratuita para seleccionar paso de pixel/brillo/resolucion correctos segun proyecto, y 6) cobertura nacional con flota propia en CDMX y operacion comercial en toda la Republica. +500 proyectos entregados, 98% de satisfaccion." } }
