  <script type="application/ld+json">

      { "@type": "Question", "name": "Con cuanta anticipacion debo reservar el equipo para mi evento?",
        "acceptedAnswer": { "@type": "Answer", "text": "EVENTECH recomienda reservar con al menos 2 semanas de anticipacion para garantizar disponibilidad, especialmente en temporada alta de noviembre a febrero. Para eventos grandes como bodas, XV anos o congresos corporativos, lo ideal es apartar con 1 a 2 meses de anticipacion. Tambien se atienden solicitudes de ultimo momento sujetas a disponibilidad del inventario." } },
      { "@type": "Question", "name": "El precio incluye entrega, montaje y recoleccion?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. Todos los paquetes de EVENTECH incluyen entrega en el venue, montaje profesional por el equipo tecnico y recoleccion al finalizar el evento. El costo de envio puede variar segun la ubicacion del venue, pero siempre se detalla en la cotizacion antes de confirmar. Sin sorpresas en factura." } },
      { "@type": "Question", "name": "Que zonas cubren para la entrega de equipo?",
        "acceptedAnswer": { "@type": "Answer", "text": "EVENTECH cubre toda la Ciudad de Mexico y Zona Metropolitana, incluyendo Polanco, Santa Fe, Coyoacan, Roma-Condesa, Del Valle, Tlalpan, Xochimilco, Centro Historico, Naucalpan, Huixquilucan, Tlalnepantla, Metepec, Toluca, Cuernavaca, Queretaro y otras ciudades cercanas con costos de envio accesibles. Cuatro oficinas operativas distribuidas estrategicamente en CDMX y Edomex." } },
      { "@type": "Question", "name": "Puedo hacer cambios en mi pedido despues de reservar?",
        "acceptedAnswer": { "@type": "Answer", "text": "Por supuesto. EVENTECH entiende que los detalles de un evento pueden cambiar. Se pueden modificar cantidades, agregar o quitar equipo hasta 72 horas antes del evento sin costo adicional. Cambios con menor anticipacion estan sujetos a disponibilidad del inventario al momento del pedido modificado." } },
      { "@type": "Question", "name": "Que metodos de pago aceptan?",
        "acceptedAnswer": { "@type": "Answer", "text": "EVENTECH acepta transferencia bancaria, deposito en efectivo, tarjeta de credito y debito. Para reservar el equipo se solicita un anticipo del 50% y el saldo restante se liquida antes de la entrega. La empresa emite factura fiscal CFDI para empresas que lo requieran, con datos fiscales completos del cliente." } },
      { "@type": "Question", "name": "Que pasa si algun equipo se dana durante el evento?",
        "acceptedAnswer": { "@type": "Answer", "text": "Todo el equipo EVENTECH cuenta con un seguro basico que cubre desgaste normal de uso durante el evento. En caso de danos mayores o perdida del equipo, se evalua segun las condiciones acordadas en el contrato de renta firmado antes de la entrega. Las condiciones de cobertura se explican de forma transparente antes de firmar para evitar sorpresas." } },
      { "@type": "Question", "name": "Cuanto tiempo tarda la cotizacion?",
        "acceptedAnswer": { "@type": "Answer", "text": "EVENTECH garantiza respuesta en menos de 24 horas para cotizaciones formales con propuesta detallada por escrito. Para consultas rapidas por WhatsApp, la respuesta llega en menos de 30 minutos durante horario de atencion (Lun-Vie 9:00-19:00, Sabados 9:00-14:00). La cotizacion incluye desglose claro de equipo, montaje, transporte y servicios complementarios." } },
      { "@type": "Question", "name": "Manejan paquetes completos o solo equipos sueltos?",
        "acceptedAnswer": { "@type": "Answer", "text": "Ambas opciones. EVENTECH renta equipo suelto (solo mobiliario, solo audio, solo iluminacion) o paquetes integrales que combinan mobiliario + audiovisual + carpas + iluminacion + catering bajo un solo proveedor. Los paquetes completos resultan mas economicos por la coordinacion y montaje unificado — especialmente para bodas, XV anos y congresos corporativos." } },
      { "@type": "Question", "name": "Que diferencia a EVENTECH de otros proveedores?",
        "acceptedAnswer": { "@type": "Answer", "text": "Ocho diferenciadores documentados: 1) cotizacion en menos de 24 horas con propuesta personalizada, 2) inventario completo en 8 lineas de servicio bajo un solo proveedor (sin coordinar con multiples empresas), 3) garantia de calidad con reposicion inmediata si algo falla, 4) precios transparentes con montaje incluido y sin sorpresas, 5) cobertura CDMX + Estado de Mexico + foraneos cercanos, 6) personal capacitado para montaje y asesoria, 7) montaje y desmontaje incluidos en cotizacion, 8) +500 eventos exitosos documentados con alianzas activas con otros proveedores del sector (PODIUMEX, PALED, INFLAPY, REDEIL, DEGLOB, MESPIC, MEDEDUL, SOEVE)." } }
    ]
