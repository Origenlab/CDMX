      { "@type": "Question", "name": "Es gratis usar el directorio?",

      { "@type": "Question", "name": "Como elijo entre varias empresas de la misma categoria?",

      { "@type": "Question", "name": "Cubren todas las alcaldias de la CDMX?",
        "acceptedAnswer": { "@type": "Answer", "text": "Si. El directorio cubre las 16 alcaldias de la Ciudad de Mexico ademas de los municipios principales del Estado de Mexico para categorias con cobertura metropolitana (Naucalpan, Huixquilucan, Atizapan, Tlalnepantla, Cuautitlan Izcalli, Metepec)." } },
