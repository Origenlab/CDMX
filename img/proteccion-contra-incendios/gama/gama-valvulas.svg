      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="60%" stop-color="#2a0808"/>
      <stop offset="100%" stop-color="#3b0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
