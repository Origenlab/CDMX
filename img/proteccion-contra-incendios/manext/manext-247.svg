      <stop offset="40%" stop-color="#a01e2d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a01e2d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
