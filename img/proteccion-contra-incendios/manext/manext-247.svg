      <stop offset="0%" stop-color="#0d0608"/>
      <stop offset="50%" stop-color="#2a0508"/>
      <stop offset="100%" stop-color="#4a0a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.65">
